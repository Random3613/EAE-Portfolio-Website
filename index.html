<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════════════════════════════════════ -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo" id="navLogo"></a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#achievements">Achievements</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#certifications">Certifications</a></li>
      </ul>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════════════════
       HERO SECTION
  ═══════════════════════════════════════════════════════════════════════ -->
  <section id="hero">
    <div class="equalizer" id="equalizer"></div>
    <div class="hero-content">
      <h1 id="heroName"></h1>
      <p class="tagline" id="heroTagline"></p>
      <a href="#about" class="cta-btn">Explore My World</a>
    </div>
    <div class="scroll-indicator">
      <span></span>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       ABOUT ME
  ═══════════════════════════════════════════════════════════════════════ -->
  <section id="about" class="section">
    <div class="container">
      <h2 class="section-title"><span>About</span> Me</h2>
      <div class="about-grid">
        <div class="about-image">
          <img id="profileImage" src="images/profile-placeholder.png" alt="Profile" />
        </div>
        <div class="about-text" id="aboutText"></div>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SKILLS
  ═══════════════════════════════════════════════════════════════════════ -->
  <section id="skills" class="section alt-bg">
    <div class="container">
      <h2 class="section-title"><span>My</span> Skills</h2>
      <div class="skills-grid" id="skillsGrid"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       ACHIEVEMENTS
  ═══════════════════════════════════════════════════════════════════════ -->
  <section id="achievements" class="section">
    <div class="container">
      <h2 class="section-title"><span>My</span> Achievements</h2>
      <div class="badges-grid" id="achievementsGrid"></div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════════════════
       PROJECTS
  ═══════════════════════════════════════════════════════════════════════ -->
  <section id="projects" class="section alt-bg">
    <div class="container">
      <h2 class="section-title"><span>My</span> Projects</h2>
      <div class="albums-grid" id="projectsGrid"></div>
    </div>
  </section>


  <!-- ═══════════════════════════════════════════════════════════════════════
       CERTIFICATIONS
  ═══════════════════════════════════════════════════════════════════════ -->
  <section id="certifications" class="section">
    <div class="container">
      <h2 class="section-title"><span>Certifications</span></h2>
      <div class="certs-grid" id="certsGrid"></div>
    </div>
  </section>


  <!-- ═══════════════════════════════════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════════════════════════════════ -->
  <footer id="footer">
    <p id="footerText"></p>
  </footer>

  <!-- ═══════════════════════════════════════════════════════════════════════
       MODAL
  ═══════════════════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
